<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="game-info">
            <div class="info-box">
                <h2>Score</h2>
                <div id="score">0</div>
            </div>
            <div class="info-box">
                <h2>Level</h2>
                <div id="level">1</div>
            </div>
            <div class="controls-info">
                <p>Controls:</p>
                <ul>
                    <li>← / → : Move</li>
                    <li>↑ : Rotate</li>
                    <li>↓ : Drop</li>
                </ul>
            </div>
            <button id="start-btn">Start Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
